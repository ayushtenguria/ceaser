[alembic]
script_location = app/db/migrations
prepend_sys_path = .

# The sqlalchemy.url is overridden at runtime in env.py from app settings.
# This value is only a fallback for offline / autogenerate commands.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/ceaser

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
